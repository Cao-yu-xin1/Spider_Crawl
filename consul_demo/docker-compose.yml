version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    ports:
      - "8300:8300"
      - "8301:8301"
      - "8301:8301/udp"
      - "8302:8302"
      - "8302:8302/udp"
      - "8500:8500"
      - "8600:8600"
      - "8600:8600/udp"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: agent -server -ui -node=consul-server -bootstrap-expect=1 -client=0.0.0.0
#    restart: unless-stopped
